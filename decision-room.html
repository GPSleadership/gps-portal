  .empty { font-size:13px; color:var(--gray-600); font-style:italic; padding:8px 0; }

  /* Skeleton shimmer -- replaces the blank-white spinner on first load */

<body>

    <div class="skeleton-card"><div class="skeleton-line sk-title" style="width:45%"></div><div class="skeleton-line sk-p"></div><div class="skeleton-line sk-p sk-short"></div></div>

</div>

<!-- Sticky sprint bar -- appears after 400px scroll when a sprint URL is available -->
<div id="stickyCta" style="display:none;position:fixed;bottom:4px;left:0;right:0;z-index:200;padding:0 16px 0;">

    <div><div style="font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:#9FC0D6;font-weight:700;" id="stickyLabel">The 90-Day Sprint</div><div style="font-size:13px;color:#cfe0ea;margin-top:1px;">Three months · bi-weekly coaching · 45-day re-score · $10,000</div></div>
    <a id="stickyBtn" href="#" target="_blank" rel="noopener" style="flex-shrink:0;background:#01949A;color:#fff;font-weight:800;font-size:13px;padding:9px 18px;border-radius:7px;text-decoration:none;white-space:nowrap;">Start now →</a>
  </div>
</div>

<script>
/* GPS Decision Room -- read-only sponsor page.
   All access control + confidentiality is enforced server-side by
   /api/sponsor-data. This page renders ONLY what the endpoint returns:
   if a field (e.g. selfVsRaters) is absent, it simply isn't shown. There is
   no mock data, no role switch, no preview-bypass, and no client-side gate. */

var TOKEN = new URLSearchParams(location.search).get('token') || '';
var COACH_SESSION = new URLSearchParams(location.search).get('coach_session') || '';
var CURRENT_TEAM = null;
var DATA = null;   // last 'team' payload

function esc(t){ return String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function initials(n){ var p=String(n||'').trim().split(/\s+/); return ((p[0]||'')[0]||'')+((p[1]||'')[0]||''); }
function fmtDate(d){ if(!d) return ''; var s=String(d).slice(0,10).split('-'); if(s.length<3) return String(d); var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return m[parseInt(s[1],10)-1]+' '+parseInt(s[2],10)+', '+s[0]; }
function avgOf(arr){ var s=0,n=0; for(var i=0;i<arr.length;i++){ if(arr[i]!=null&&!isNaN(arr[i])){ s+=Number(arr[i]); n++; } } return n? Math.round(s/n*100)/100 : null; }
function band(v){ if(v==null) return null; return v>=4.0?'green':(v>=3.0?'amber':'red'); }

function api(action, extra){
  var body = Object.assign({ action:action, token:TOKEN }, extra||{});
  if(COACH_SESSION) body.coach_session = COACH_SESSION;
  return fetch('/api/sponsor-data', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) })
    .then(function(r){ return r.json().then(function(j){ if(!r.ok) throw new Error(j.error||('HTTP '+r.status)); return j; }); });
}

function init(){
  if(!TOKEN){ document.getElementById('view').innerHTML='<div class="card"><div class="empty">This link is missing its access token. Please use the link from your invitation email.</div></div>'; return; }
  api('list-teams').then(function(res){
    document.getElementById('headerWho').textContent = res.sponsor ? res.sponsor.name : '';
    var teams = res.teams||[];
    if(!teams.length){ document.getElementById('view').innerHTML='<div class="card"><div class="empty">No teams are shared with you yet.</div></div>'; return; }
    var sel=document.getElementById('teamSelect');
    sel.innerHTML = teams.map(function(t){ return '<option value="'+t.id+'">'+esc(t.client_org_name||t.name)+' -- '+esc(t.name)+'</option>'; }).join('');
    document.getElementById('teamBar').style.display = teams.length>1 ? 'flex' : 'none';
    loadTeam(teams[0].id);
  }).catch(showError);
}
function showError(err){ document.getElementById('view').innerHTML='<div class="card"><div class="empty">'+esc(err.message||'Could not load. Please try your link again.')+'</div></div>'; }

function setHeaderOrgLogo(t){
  var el=document.getElementById('headerOrgLogo'); if(!el) return;
  if(t && t.org_logo_url){ el.src=t.org_logo_url; el.alt=(t.client_org_name||'')+' logo'; el.style.display='block'; }
  else { el.style.display='none'; }
}
function loadTeam(teamId){
  CURRENT_TEAM = teamId;
  document.getElementById('view').innerHTML='<div class="skeleton-wrap"><div class="skeleton-card"><div class="skeleton-line sk-title"></div><div class="skeleton-line sk-p sk-short"></div><div class="skeleton-line sk-p"></div></div><div class="skeleton-card"><div class="skeleton-line sk-title" style="width:30%"></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:8px;"><div class="skeleton-line" style="height:70px;border-radius:8px;"></div><div class="skeleton-line" style="height:70px;border-radius:8px;"></div><div class="skeleton-line" style="height:70px;border-radius:8px;"></div></div></div></div>';
  api('team', { team_id:teamId }).then(function(res){
    setHeaderOrgLogo(res.team);
    if(res.gated){ renderGate(res); return; }
    DATA = res;
    window.REC_COMMITMENTS = res.rec_commitments || {};
    window._hasCommitted = Object.values(window.REC_COMMITMENTS).some(function(v){ return v==='commit'; });
    var t=res.team;
    document.getElementById('teamMeta').textContent = (t.team_type||'')+' team · Sponsor: '+(t.primary_sponsor||'');
    renderTeam();
    updateRecSummaryBar();
    window.scrollTo(0,0);
  }).catch(showError);
}

/* ───────── GATE ───────── */
function renderGate(res){
  var t=res.team||{};
  var rows=(res.owed||[]).map(function(o){
    return '<div class="gate-row"><div><div class="gate-name">'+esc(o.role||'Leader')+'</div><div class="gate-role">'+esc(cpLabel(o.checkpoint))+' review due</div></div>'
      + '<a class="btn btn-navy" style="text-decoration:none;" href="'+esc(o.survey_url)+'">Provide feedback</a></div>';
  }).join('');
  document.getElementById('view').innerHTML='<div class="gate-card">'
    + '<div class="gate-lock">Team view locked</div>'
    + '<div class="gate-title">Complete your feedback to unlock '+esc(t.client_org_name||t.name||'this team')+'</div>'
    + '<div class="gate-sub">You owe feedback on '+(res.owed||[]).length+' '+(((res.owed||[]).length===1)?'person':'people')+' you are responsible for on this team. The full team view opens the moment you submit. No one gets judged on feedback that was never given, including by you.</div>'
    + '<div class="gate-list">'+rows+'</div></div>';
}
function cpLabel(cp){ cp=String(cp||'').toLowerCase(); return (cp.indexOf('90')>=0)?'90-day':((cp.indexOf('30')>=0)?'30-day':'Baseline'); }

/* ───────── helpers over the payload ───────── */
function memberStanding(m){
  if(m.scoreboard && m.scoreboard.length){
    var cp = scoreboardCheckpoint(m.scoreboard);
    return avgOf(m.scoreboard.map(function(s){ return s[cp]; }));
  }
  if(m.selfVsRaters && m.selfVsRaters.tp3){
    var tp=m.selfVsRaters.tp3; return avgOf([tp.trust&&tp.trust.raters, tp.proactivity&&tp.proactivity.raters, tp.productivity&&tp.productivity.raters]);
  }
  return null;
}
function scoreboardCheckpoint(sb){
  var has=function(k){ for(var i=0;i<sb.length;i++) if(sb[i][k]!=null) return true; return false; };
  if(has('d90')) return 'd90'; if(has('d30')) return 'd30'; return 'baseline';
}
function supervisorRating(m){
  if(!m.scoreboard || !m.scoreboard.length) return null;
  var cp=scoreboardCheckpoint(m.scoreboard);
  var sup=m.scoreboard.filter(function(s){return s.supervisor;})[0];
  return sup ? sup[cp] : null;
}
function computeStatus(m){
  if(m.surveyOpen) return { key:'pending', label:'Survey open', cls:'b-draft' };
  var v=memberStanding(m);
  var lowEng = m.engagement && m.engagement.checkinRate!=null && m.engagement.checkinRate<0.6;
  // Supervisor override: the supervisor's read carries decision weight. A supervisor
  // rating in the 3s or below (under 4) is a high-risk signal even when peers rate higher.
  var sup=supervisorRating(m);
  if(sup!=null && sup<4.0) return { key:'risk', label:'At risk', cls:'b-flag-red' };
  if(v!=null && v<3.0) return { key:'risk', label:'At risk', cls:'b-flag-red' };
  if(lowEng && (v==null||v<4.0)) return { key:'risk', label:'At risk', cls:'b-flag-red' };
  if(v!=null && v<4.0) return { key:'dev', label:'Developing', cls:'b-flag-amber' };
  if(v!=null) return { key:'ontrack', label:'On track', cls:'b-flag-green' };
  return { key:'pending', label:'No score yet', cls:'b-draft' };
}

/* ───────── TEAM VIEW ───────── */
function renderSprintCta(url, firstName, compact){
  if(!url) return '';
  var btnLabel = firstName ? 'Start '+firstName+"'s Sprint \u2192" : 'Get started \u2192';
  var titleLine = firstName ? 'Start '+firstName+"'s 90-Day Sprint" : 'Start the 90-Day Leadership Sprint';
  if(compact){
    return '<div id="sprint-cta-inline" style="background:var(--navy);border:2px solid #01949A;border-radius:10px;padding:18px 20px;margin-top:14px;">'
      +'<div style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#01949A;font-weight:700;margin-bottom:4px;">The next step</div>'
      +'<div style="font-family:Georgia,serif;font-size:17px;font-weight:800;color:#fff;margin-bottom:6px;">'+titleLine+'</div>'
      +'<div style="font-size:13px;color:#cfe0ea;line-height:1.5;margin-bottom:12px;">Three months · Bi-weekly coaching · 45-day re-score · $10,000</div>'
      +'<a href="'+esc(url)+'" target="_blank" rel="noopener" style="display:inline-block;background:#01949A;color:#fff;font-weight:800;font-size:13px;padding:9px 18px;border-radius:7px;text-decoration:none;">'+btnLabel+'</a>'
      +'</div>';
  }
  return '<div id="sprint-cta" style="background:var(--navy);border-radius:10px;padding:26px 28px;margin-top:16px;">'
    +'<div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#9FC0D6;font-weight:700;margin-bottom:6px;">Ready to build on this?</div>'
    +'<div style="font-family:Georgia,serif;font-size:20px;font-weight:800;color:#fff;margin-bottom:8px;">'+titleLine+'</div>'
    +'<div style="font-size:14px;color:#cfe0ea;line-height:1.6;margin-bottom:12px;">The diagnostic tells you where the gaps are. The Sprint closes them -- with structured coaching, weekly accountability, and a 90-day plan built around what this leader needs to deliver. Three months · bi-weekly coaching sessions · 45-day and 90-day re-score · $10,000</div>'
    +'<details open style="margin-bottom:16px;"><summary style="cursor:pointer;font-size:13px;color:#9FC0D6;font-weight:700;letter-spacing:.02em;outline:none;user-select:none;list-style:none;">What 90 days buys you ▸</summary>'
    +'<div style="margin-top:10px;display:flex;flex-direction:column;gap:8px;">'
    +'<div style="font-size:13px;color:#eaf2f7;line-height:1.5;display:flex;gap:10px;"><span style="color:#01949A;font-weight:900;min-width:16px;">1</span><span>A 90-day plan built specifically around the trust gap -- not a generic program.</span></div>'
    +'<div style="font-size:13px;color:#eaf2f7;line-height:1.5;display:flex;gap:10px;"><span style="color:#01949A;font-weight:900;min-width:16px;">2</span><span>A 45-day re-score -- you see movement in the data before you decide how far to invest.</span></div>'
    +'<div style="font-size:13px;color:#eaf2f7;line-height:1.5;display:flex;gap:10px;"><span style="color:#01949A;font-weight:900;min-width:16px;">3</span><span>A final 90-day report -- showing where the leader started, what moved, and what the next decision is.</span></div>'
    +'</div></details>'
    +'<a href="'+esc(url)+'" target="_blank" rel="noopener" style="display:inline-block;background:#01949A;color:#fff;font-weight:800;font-size:14px;padding:11px 24px;border-radius:7px;text-decoration:none;">'+btnLabel+'</a>'
    +'<div style="font-size:12px;color:#7FA8BE;margin-top:10px;">You\'ll be sent to our secure checkout. Your coach will reach out within 24 hours to schedule session 1.</div>'
    +(DATA&&DATA.booking_url?'<div style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1);"><a href="'+esc(DATA.booking_url)+'" target="_blank" rel="noopener" style="font-size:13px;color:#9FC0D6;text-decoration:none;font-weight:600;">Not ready? Talk to Alex first &rarr;</a></div>':'')
    +'</div>';
}

function renderCoachPreviewBanner(){
  if(!DATA.coach_preview) return '';
  return '<div style="background:#1b2a3a;color:#7FE3D6;font-size:12px;font-weight:700;text-align:center;padding:8px 16px;border-radius:8px;margin-bottom:14px;letter-spacing:.04em;">COACH PREVIEW -- You are seeing this as the sponsor will see it. Their actual link is unaffected.</div>';
}

function renderTeam(){
  var t=DATA.team, members=DATA.members||[];
  if(DATA.confidentiality==='progress'){ return renderProgress(members); }
  var html='';
  html += renderCoachPreviewBanner();
  if(DATA.confidentiality==='private'){
    html += '<div class="conf-banner"><b>Confidential engagement.</b> Each leader\'s individual diagnostic scores (self vs raters) stay private to them and are not shown here. Everything else -- the 90-day plan, stakeholder progress, and engagement -- is shared.</div>';
  }
  // One-person team: land directly on that leader's report (with recommendations
  // and succession), not a blank team dashboard.
  if(members.length===1){
    var firstName1 = String(members[0].name||'').split(' ')[0];
    html += memberReportHtml(members[0]);
    html += renderRecs(DATA.recommendations||[]);
    html += renderSignals(DATA.signals||[]);
    html += renderTeamReport(DATA.team_report);
    html += renderSprintCta(DATA.sprint_cta_url, firstName1);
    document.getElementById('view').innerHTML = html;
    return;
  }
  html += renderSnapshot(t);
  html += renderMomentum(members);
  html += renderThemes(t.themes);
  html += renderIntentImpact(t.intent_impact);
  html += renderSSC(t.start_stop_continue);
  html += renderRoster(members);
  if(DATA.show_succession!==false) html += renderTeamSuccession(members);
  if(DATA.show_succession!==false) html += renderTalentGrid(members);
  html += renderRecs(DATA.recommendations||[]);
  html += renderSignals(DATA.signals||[]);
  html += renderTeamReport(DATA.team_report);
  html += renderSprintCta(DATA.sprint_cta_url);
  document.getElementById('view').innerHTML = html;
}

/* ───────── PROGRESS / POC VIEW ─────────
   A coordinating POC sees ONLY where each leader is in the process (diagnostic +
   assessment) and their own full report. No other leader's results are sent by
   the server in this mode, so there is nothing here that could leak them. */
function fmtStage(s){ if(!s) return '--'; return String(s).replace(/_/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();}); }
// Prominent kickoff + debrief dates line for the sponsor/POC. Pulled from the pipeline
// stages; shows TBD for a date not set yet. Omitted entirely if neither is set.
function meetingDates(pl){
  if(!pl||!pl.stages) return '';
  var k=(pl.stages.filter(function(s){return s.key==='kickoff';})[0]||{}).date;
  var d=(pl.stages.filter(function(s){return s.key==='debrief';})[0]||{}).date;
  if(!k && !d) return '';
  return '<div style="font-size:12px;color:#475569;margin-top:3px">📅 Kickoff: <strong>'+(k?esc(fmtDate(k)):'TBD')+'</strong> &nbsp;·&nbsp; Debrief: <strong>'+(d?esc(fmtDate(d)):'TBD')+'</strong></div>';
}
/* Shared process-pipeline render -- used in the POC view, the sponsor roster, and
   each member report. Stage + date only (no nudge flag). */
function renderPipeline(pl){
  if(!pl||!pl.stages||!pl.stages.length) return '';
  var items = pl.stages.map(function(s){
    var done=s.done, cur=(s.key===pl.current_key && !done);
    var mark = done?'✓':(cur?'●':'○');
    var color = done?'#1a7f4b':(cur?'#b45309':'#9ca3af');
    var txtcol = (done||cur)?'#1f2937':'#6b7280';
    var when = s.date?fmtDate(s.date):'';
    var note = s.note?' · '+esc(s.note):'';
    return '<div style="display:flex;align-items:center;gap:8px;padding:2px 0;font-size:13px;color:'+txtcol+';font-weight:'+(cur?'600':'400')+'">'
      +'<span style="color:'+color+';width:14px;display:inline-block;text-align:center">'+mark+'</span>'
      +'<span style="flex:1">'+esc(s.label)+note+'</span>'
      +(when?'<span style="color:#6b7280;font-size:12px;white-space:nowrap">'+esc(when)+'</span>':'')+'</div>';
  }).join('');
  return '<div style="margin-top:8px;border-left:2px solid #e5e7eb;padding-left:10px">'+items+'</div>';
}
function pipelineCard(m){
  if(!m||!m.pipeline) return '';
  return '<div class="card"><div class="card-head"><div class="card-title"><span class="dot"></span>Process</div>'
    +'<span class="section-note">Currently: '+esc(m.pipeline.current_label||'')+'</span></div>'+renderPipeline(m.pipeline)+'</div>';
}
function renderProgress(members){
  var own = members.filter(function(m){ return !m.status_only; });
  var rows = (members||[]).map(function(m){
    var name = m.name || (m.report_json&&m.report_json.name) || m.role || 'Leader';
    var mine = m.status_only ? '' : ' <span class="badge b-sub">You</span>';
    var asmt = m.assessment ? (m.assessment.invited ? ('Assessment: '+fmtStage(m.assessment.pre_status)) : 'Assessment: not invited yet') : '';
    var cur = (m.pipeline && m.pipeline.current_label) ? '<span class="badge b-draft">'+esc(m.pipeline.current_label)+'</span>' : '';
    return '<div class="doc-row" style="align-items:flex-start"><div class="doc-icon">'+esc(initials(name))+'</div>'

function teamMomentum(members){
  var bV=[],cV=[],n=0;
  members.forEach(function(m){
    if(!m.scoreboard||!m.scoreboard.length) return;
    var cp=scoreboardCheckpoint(m.scoreboard);
    var b=avgOf(m.scoreboard.map(function(s){return s.baseline;}));
    var c=avgOf(m.scoreboard.map(function(s){return s[cp];}));
    if(b!=null){ bV.push(b); } if(c!=null){ cV.push(c); } if(b!=null||c!=null) n++;
  });
  var b=avgOf(bV), c=avgOf(cV); if(b==null||c==null) return null; return { n:n, base:b, cur:c };
}
function renderMomentum(members){

// ── Rec commitment helpers ────────────────────────────────────────────────────
async function setRecCommitment(recKey, decision, evt){
  if(evt && evt.stopPropagation) evt.stopPropagation();
  window.REC_COMMITMENTS = window.REC_COMMITMENTS || {};
  // Capture prior state BEFORE optimistic update so we can restore it on error
  var _priorDec = Object.prototype.hasOwnProperty.call(window.REC_COMMITMENTS, recKey)
    ? window.REC_COMMITMENTS[recKey] : undefined;
  // Optimistic update
  if(decision === null){ delete window.REC_COMMITMENTS[recKey]; }
  else { window.REC_COMMITMENTS[recKey] = decision; }
  if(decision === 'commit') window._hasCommitted = true;
  updateRecCardButtons(recKey);
  updateRecSummaryBar();
  // Clear any prior error
  var errEl = document.getElementById('rcerr-'+recKey);
  if(errEl) errEl.textContent = '';
  // Persist via API — token is required for sponsor auth
  try {
    var teamId = DATA && DATA.team && DATA.team.id;
    var r = await fetch('/api/sponsor-data', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'saveRecCommitment', token:TOKEN, team_id:teamId, rec_key:recKey, decision:decision })
    });
    var j = await r.json().catch(function(){ return {}; });
    if(!r.ok || !j.ok) throw new Error(j.error || ('HTTP '+r.status));
  } catch(err) {
    // Revert to the exact state before the click
    if(_priorDec === undefined){ delete window.REC_COMMITMENTS[recKey]; }
    else { window.REC_COMMITMENTS[recKey] = _priorDec; }
    updateRecCardButtons(recKey);
    updateRecSummaryBar();
    if(errEl) errEl.textContent = 'Save failed — try again';
  }
}

function updateRecCardButtons(recKey){
  var dec = (window.REC_COMMITMENTS||{})[recKey];
  var isCommit = dec === 'commit', isPass = dec === 'pass';
  var cb = document.getElementById('cbtn-'+recKey);
  if(cb){
    cb.innerHTML = isCommit ? '&#10003; Committed' : "I'm in &rarr;";
    cb.style.background = isCommit ? '#01949A' : '#fff';
    cb.style.color = isCommit ? '#fff' : '#01949A';
    cb.style.borderColor = '#01949A';
  }
  var pb = document.getElementById('pbtn-'+recKey);
  if(pb){
    pb.textContent = isPass ? 'Not this time' : 'Pass';
    pb.style.background = isPass ? '#6b7280' : '#fff';
    pb.style.color = isPass ? '#fff' : '#9ca3af';
    pb.style.borderColor = isPass ? '#6b7280' : '#d1d5db';
  }
  var clr = document.getElementById('clr-'+recKey);
  if(clr) clr.style.display = dec ? 'inline' : 'none';
}

function updateRecSummaryBar(){
  var bar = document.getElementById('rec-summary-bar');
  if(!bar) return;
  var all = DATA && DATA.recommendations || [];
  if(!all.length){ bar.style.display='none'; return; }
  var committed=0, passed=0;
  all.forEach(function(r){
    var k=r.id||r.short_title;
    var d=(window.REC_COMMITMENTS||{})[k];
    if(d==='commit') committed++;
    else if(d==='pass') passed++;
  });
  var remaining = all.length - committed - passed;
  bar.style.display = (committed||passed) ? 'block' : 'none';
  bar.innerHTML = (committed?'<span style="color:#01949A;font-weight:700;">'+committed+' committed</span> &nbsp;':'')
    +(passed?'<span style="color:#6b7280;font-weight:600;">'+passed+' passed</span> &nbsp;':'')

function sponsorReadoutCards(m){

  function fnum(v){ return (v==null||isNaN(v))?'--':Number(v).toFixed(2); }
  function scol(v){ return v==null?'#7a8a95':(v>=4?C.green:(v>=3?C.amber:C.red)); }
  function sband(v){ return v==null?'':(v>=4?'Strong':(v>=3?'Develop':'Serious')); }

  var dr = gget('direct_report'), sup = gget('supervisor');
  var other = wmerge([gget('peer'), gget('internal_partner'), gget('other_colleagues')]);
  var tp3 = sc.tp3_index;
  var debriefDate = r.debrief && r.debrief.date;
  var debriefDaysOut = null;
  if(debriefDate){ var _ms=new Date(debriefDate)-Date.now(); debriefDaysOut=Math.ceil(_ms/86400000); }
  var sponsorFirst = (DATA && DATA.team && DATA.team.primary_sponsor) ? String(DATA.team.primary_sponsor).split(' ')[0] : '';

  var out = '';

  var _engBadgeStyle=m.is_coaching_client?'background:#004369;color:#fff;':'background:#E8F7F7;color:#01949A;';

    + '</div>';

  // ── SLIM CONTEXT STRIP (replaces profile card + countdown box + gray note) ──

    + '<div style="width:32px;height:32px;border-radius:50%;background:'+C.navy+';display:flex;align-items:center;justify-content:center;font-family:Montserrat,sans-serif;font-size:11px;font-weight:800;color:#E5DDC8;flex-shrink:0;">'+esc(initials(name))+'</div>'

    + ' <span style="'+_engBadgeStyle+'padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700;margin-left:4px;">'+_engBadge+'</span>'

  out += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:14px;">'
    + kpi('Overall TP3','<span style="color:'+scol(tp3)+';">'+fnum(tp3)+'</span>',sband(tp3)+' · 1–5 scale')
    + kpi('You vs. their team','<span style="color:'+scol(sup&&sup.tp3)+';">'+fnum(sup&&sup.tp3)+'</span> <span style="font-size:13px;color:'+C.mid+';font-family:inherit;">vs</span> <span style="color:'+scol(dr&&dr.tp3)+';">'+fnum(dr&&dr.tp3)+'</span>','your TP3 vs direct reports')
    + kpi('Bench & succession','<span style="color:'+scol(sc.bench)+';">'+fnum(sc.bench)+'</span>','Successor identified: '+successorLabel)
    + kpi('90-day plan','<span style="font-size:16px;color:'+C.amber+';">'+esc(planStatus)+'</span>','see plan review below')
    + '</div>';

  // ── TOP-LEVEL SCORE BARS (3.0 grey · 4.0 green reference lines) ──
  function bar(lbl,v){ return '<div style="margin:12px 0;"><div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px;"><span>'+lbl+'</span><b style="color:'+scol(v)+';">'+fnum(v)+'</b></div><div style="position:relative;background:#EEF1F4;border-radius:30px;height:14px;overflow:hidden;"><div style="height:100%;border-radius:30px;width:'+wpct(v)+'%;background:'+scol(v)+';"></div><div style="position:absolute;top:-3px;bottom:-3px;left:50%;width:2px;background:#6b7682;"></div><div style="position:absolute;top:-3px;bottom:-3px;left:75%;width:2px;background:'+C.green+';"></div></div></div>'; }
  out += '<div class="card"><div class="card-head"><div class="card-title"><span class="dot"></span>How '+esc(first)+"'s "+totalRaters+' raters scored '+esc(first)+'</div></div>'
    + '<div style="font-size:13px;color:'+C.mid+';margin-bottom:2px;">'+fnum(tp3)+' / 5 overall · TP3 index</div>'
    + bar('Trust',sc.trust)+bar('Proactivity',sc.proactivity)+bar('Productivity',sc.productivity)+bar('Overall impact',sc.impact)+bar('Bench strength',sc.bench)
    + '<div style="font-size:12px;color:'+C.mid+';text-align:right;margin-top:6px;">grey line = 3.0 · green line = 4.0 standard</div>'
    + '</div>';

  // ── THE ONE THING (red-flag panel) ──
  if(sup){
    var dims=[['Trust','trust'],['Proactivity','proactivity'],['Productivity','productivity']];
    var lowest=null; dims.forEach(function(d){ var v=sup[d[1]]; if(v!=null && (lowest==null || v<lowest.v)) lowest={n:d[0],v:v}; });
    if(lowest && lowest.v<3){
      out += '<div style="background:'+C.redbg+';border:1px solid #f0b9b9;border-left:5px solid '+C.red+';border-radius:12px;padding:20px 24px;margin-top:14px;">'
        + '<div style="color:'+C.red+';font-size:17px;font-weight:800;font-family:Georgia,serif;margin-bottom:8px;">'+lowest.n+' with you, '+esc(first)+"'s supervisor: "+fnum(lowest.v)+' / 5 (Serious)</div>'
        + '<div style="font-size:14px;margin:6px 0;">This is the gap that decides whether more investment pays off.'+(dr?(' Direct reports rate '+esc(first)+' <b>'+fnum(dr.tp3)+'</b> overall -- the split is specifically the working relationship with you, not the ability to lead a team.'):'')+'</div>'
        + '<div style="font-size:14px;font-weight:700;color:#8c2020;border-top:1px solid #f0b9b9;padding-top:10px;margin-top:8px;">This is the number the 90-day plan is built to move. We\'ll show you the change at day 45 and 90 -- how far to invest from there is your call.</div>'
        + '</div>';
    }
  }

  // ── GROUP TABLE + the sponsor's OWN words ──
  function trow(label,gp,flag){ if(!gp) return ''; var f=flag && gp.tp3!=null && gp.tp3<=2.9; return '<tr'+(f?' style="background:#EEF4F8;"':'')+'><td style="text-align:left;padding:8px 6px;border-bottom:1px solid '+C.line+';font-weight:600;">'+esc(label)+' ('+gp.n+')</td>'+['trust','proactivity','productivity','tp3'].map(function(k){ return '<td style="text-align:right;padding:8px 6px;border-bottom:1px solid '+C.line+';color:'+scol(gp[k])+';font-weight:700;">'+fnum(gp[k])+'</td>'; }).join('')+'</tr>'; }
  var th='text-align:right;color:'+C.mid+';font-weight:600;border-bottom:2px solid '+C.line+';padding:7px 6px;';
  var quotes=(r.sponsor_verbatims||[]).map(function(q){ return '<p style="margin:6px 0;font-style:italic;font-family:Georgia,serif;color:#3a2e16;font-size:14px;">"'+esc(q)+'"</p>'; }).join('');
  out += '<div class="card"><div class="card-head"><div class="card-title"><span class="dot"></span>How you rated '+esc(first)+' vs. how the team did</div></div>'
    + '<table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:6px;"><thead><tr><th style="text-align:left;color:'+C.mid+';font-weight:600;border-bottom:2px solid '+C.line+';padding:7px 6px;">Rater</th><th style="'+th+'">Trust</th><th style="'+th+'">Proact.</th><th style="'+th+'">Prod.</th><th style="'+th+'">TP3</th></tr></thead><tbody>'
    + trow('Direct reports',dr,false) + trow('Other colleagues',other,false) + trow('You (supervisor)',sup,true)
    + '</tbody></table>'
    + '<div style="font-size:12px;color:'+C.mid+';margin-top:8px;">Peers are folded into "Other colleagues" -- groups under 3 raters aren\'t broken out, to protect confidentiality. Individual comments stay in '+esc(first)+"'s confidential debrief.</div>"
    + (quotes?'<div style="background:'+C.sand+';border-radius:10px;padding:14px 18px;margin-top:14px;"><div style="font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:'+C.mid+';font-weight:700;margin-bottom:6px;">In your words -- what you wrote about '+esc(first)+'</div>'+quotes+'</div>':'')
    + '</div>';

  // ── NINE-BOX (talent placement) ──
  (function(){
    var xv=tp3, yv=sc.bench; if(xv==null||yv==null) return;
    function band(v){ return v<3?0:(v<4?1:2); }
    function frac(v,b){ var lo=(b===0?1:(b===1?3:4)), hi=(b===0?3:(b===1?4:5)); return Math.max(0,Math.min(1,(v-lo)/(hi-lo))); }
    var cb=band(xv), rb=band(yv);
    var xPct=(cb+frac(xv,cb))*(100/3), yPct=(rb+frac(yv,rb))*(100/3);
    var labels=[['Low eff · high potential','Developing · high potential','Strong · high potential'],['Low eff · solid','Core player · solid','Strong · solid'],['Low eff · emerging','Developing · emerging','Strong · emerging']];
    var hotRowTop=2-rb, hotCol=cb, cells='';
    for(var rTop=0;rTop<3;rTop++){ for(var c=0;c<3;c++){ var hot=(rTop===hotRowTop&&c===hotCol); cells+='<div style="border:1px solid #eef1f4;font-size:10px;padding:5px;display:flex;align-items:flex-start;'+(hot?'background:#EAF5F0;color:'+C.green+';font-weight:700;':'color:#90a0ad;')+'">'+labels[rTop][c]+(hot?'<br>'+esc(first)+' is here':'')+'</div>'; } }
    out += '<div class="card"><div class="card-head"><div class="card-title"><span class="dot"></span>Talent placement (nine-box)</div></div>'
      + '<div style="font-size:13px;color:'+C.mid+';margin-bottom:10px;">Leadership effectiveness (TP3) across · bench / readiness up. Built from the data we have -- combine with performance and HR input before any move.</div>'
      + '<div style="display:flex;gap:18px;flex-wrap:wrap;align-items:flex-start;">'
      + '<div><div style="position:relative;width:300px;max-width:100%;height:300px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);border:1px solid '+C.line+';border-radius:8px;overflow:hidden;">'+cells
      + '<div style="position:absolute;width:20px;height:20px;border-radius:50%;background:'+C.amberbar+';border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.3);transform:translate(-50%,50%);z-index:5;left:'+xPct.toFixed(0)+'%;bottom:'+yPct.toFixed(0)+'%;" title="'+esc(first)+'"></div>'
      + '</div><div style="font-size:11px;color:'+C.mid+';font-weight:700;text-align:center;margin-top:6px;">Leadership effectiveness (TP3) →</div></div>'
      + '<div style="flex:1;min-width:200px;font-size:13px;color:'+C.ink+';line-height:1.55;"><b style="color:'+C.navy+';">'+labels[2-rb][cb]+'.</b> Effectiveness '+fnum(xv)+' and bench '+fnum(yv)+' place '+esc(first)+' in this band. The lever that moves '+esc(first)+' up and to the right is the supervisor-trust gap. We show where '+esc(first)+' sits today and what would shift it; where you take it is your decision.</div>'
      + '</div></div>';
  })();

  // ── BENCH & SUCCESSION ──
  out += '<div class="card"><div class="card-head"><div class="card-title"><span class="dot"></span>Bench &amp; succession</div></div>'
    + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;">'
    + '<div style="background:'+C.sand+';border-radius:10px;padding:12px 14px;"><div style="font-size:12.5px;color:'+C.mid+';">Bench strength (raters)</div><div style="font-size:20px;font-weight:800;margin-top:4px;color:'+scol(sc.bench)+';">'+fnum(sc.bench)+' / 5</div></div>'
    + '<div style="background:'+C.sand+';border-radius:10px;padding:12px 14px;"><div style="font-size:12.5px;color:'+C.mid+';">Successor identified</div><div style="font-size:20px;font-weight:800;margin-top:4px;color:'+(successorIdentified?C.green:C.red)+';">'+successorLabel+'</div></div>'
    + '</div>'
    + '<div style="font-size:13px;color:'+C.mid+';margin-top:12px;">Note: based on perception data -- combine with performance and HR input before promotion decisions.</div>'
    + '</div>';

  // ── OPTIONS ──
  function optRow(t,d,when){ return '<div style="border:1px solid '+C.line+';border-radius:10px;padding:12px 14px;margin:8px 0;"><div style="font-weight:800;color:'+C.navy+';font-size:14px;">'+esc(t)+'</div><div style="font-size:13px;color:'+C.ink+';margin-top:3px;">'+esc(d)+'</div><div style="font-size:13px;color:'+C.navy+';font-weight:600;margin-top:5px;">Choose this if: '+esc(when)+'</div></div>'; }
  out += '<div class="card"><div class="card-head"><div class="card-title"><span class="dot"></span>Options to weigh -- your call</div></div>'
    + '<div style="font-size:13px;color:'+C.mid+';margin-bottom:4px;">We present the data and the realistic options. Choosing among them is yours; we\'ll support whichever you pick.</div>'
    + optRow('1 · Invest behind the plan','Back the 90-day plan and re-measure the gap at day 45 and 90.','you see a long-term role for '+first+' and read the gap as behavior, not values.')
    + optRow('2 · Hold and re-measure','Set expectations now without a formal coaching investment, and re-run the read in 90 days.','you want proof of movement before committing budget.')
    + optRow('3 · Reset the role conversation','If the gap points to a deeper fit question, have a direct expectations conversation first.','the gap reads as fit or values, not a fixable behavior.')
    + '</div>';

  // ── 90-DAY PLAN REVIEW (with the actual focus + approve/request) ──
  var f=m.report_json&&m.report_json.focus, planBody='';
  if(f){
    planBody += '<div style="border:1px solid '+C.line+';border-radius:10px;padding:14px 16px;margin:10px 0;"><div style="font-weight:800;color:'+C.navy+';font-size:14px;">Goal</div><div style="font-size:13px;color:'+C.ink+';margin-top:4px;">'+esc(f.goal90||'')+'</div>';
    if(f.behaviors&&f.behaviors.length){ planBody += '<div style="font-size:12.5px;color:'+C.mid+';margin-top:8px;font-weight:700;">Behaviors being practiced</div><ul style="margin:6px 0 0 17px;font-size:13px;color:'+C.ink+';line-height:1.5;">'+f.behaviors.map(function(b){return '<li>'+esc(b)+'</li>';}).join('')+'</ul>'; }
    planBody += '</div>';
  }
  var pbtns='';
  if(pa.requires){
    if(pa.status==='approved'){
      var _sprintNext = DATA && DATA.sprint_cta_url
        ? ' <a href="'+esc(DATA.sprint_cta_url)+'" target="_blank" rel="noopener" style="display:inline-block;margin-top:10px;background:#01949A;color:#fff;font-size:13px;font-weight:800;padding:8px 16px;border-radius:7px;text-decoration:none;">'+esc(first)+"'s Sprint \u2014 start here \u2192"+'</a>'
        : '';
      pbtns='<div style="background:#EAF5F0;border:1px solid #b7ddc9;border-radius:8px;padding:12px 14px;"><span style="color:'+C.green+';font-weight:700;">You approved this plan'+(pa.decided_at?' on '+fmtDate(pa.decided_at):'')+'. The plan is locked.</span><div style="font-size:13px;color:#1f4d36;margin-top:4px;">'+esc(first)+"'s plan is locked. The 90-day sprint is what puts it into motion."+'</div>'+_sprintNext+'</div>';
    }
    else if(pa.status==='changes_requested'){
      pbtns='<div style="background:'+C.redbg+';border:1px solid #f0b9b9;border-radius:8px;padding:12px 14px;color:#8c2020;margin-bottom:10px;"><b>Changes requested'+(pa.decided_at?' on '+fmtDate(pa.decided_at):'')+'. </b>'+(pa.note?'"'+esc(pa.note)+'" ':'')+' Alex will adjust with you before anything starts.</div>'
        +'<div style="display:flex;gap:10px;flex-wrap:wrap;">'
        +'<button onclick="sponsorDecide(\''+m.client_id+'\',\'approve\')" style="background:'+C.green+';color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:700;font-size:13px;cursor:pointer;">Approve this plan instead</button>'
        +'</div><div style="font-size:12px;color:'+C.mid+';margin-top:8px;">Changed your mind? Approving here locks the plan and notifies Alex.</div>';
    }
    else { pbtns='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;">'
      + '<button onclick="sponsorDecide(\''+esc(m.client_id)+'\',\'approve\')" style="background:'+C.green+';color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:700;font-size:13px;cursor:pointer;">Approve this plan</button>'
      + '<button onclick="sponsorDecide(\''+esc(m.client_id)+'\',\'changes\')" style="background:#fff;border:1px solid '+C.amberbar+';color:'+C.amber+';border-radius:8px;padding:10px 18px;font-weight:700;font-size:13px;cursor:pointer;">Request changes</button>'
      + '</div><div style="font-size:12px;color:'+C.mid+';margin-top:8px;"><b style="color:'+C.ink+';">Approve and we lock the plan.</b> Request changes and we\'ll adjust with you before anything starts.</div>'; }
  } else {
    pbtns='<div style="font-size:13px;color:'+C.mid+';">This plan runs as part of '+esc(first)+"'s coaching. Your sign-off isn\'t required to start.</div>";
  }
  out += '<div class="card" style="border-top:4px solid '+C.teal+';"><div class="card-head"><div class="card-title"><span class="dot"></span>'+esc(first)+"'s proposed 90-day plan -- your review</div></div>"
    + '<div style="font-size:13.5px;color:'+C.ink+';background:#F7F9FA;border-radius:8px;padding:12px 14px;margin:6px 0 4px;line-height:1.55;">'+esc(first)+' has proposed the plan below. Before we lock it, you weigh in: does this target what you need and where the business is going? Approve it as-is, or request changes.</div>'
    + (m.business_outcome_goal?'<div style="border:1px solid '+C.line+';border-radius:10px;padding:14px 16px;margin:10px 0;"><div style="font-weight:800;color:'+C.navy+';font-size:14px;">Business outcome this ladders up to</div><div style="font-size:13px;color:'+C.ink+';margin-top:4px;">'+esc(m.business_outcome_goal)+'</div></div>':'')
    + planBody + pbtns
    + '</div>';

  return out;
}
function sponsorDecide(clientId, kind){
  var action = (kind==='approve') ? 'approve-plan' : 'request-changes';
  var note = null;
  if(kind==='changes'){ note = prompt('What would you like changed before the plan is locked? (optional)') || ''; }
  api(action, { client_id:clientId, note:note }).then(function(){ loadTeam(CURRENT_TEAM); }).catch(showError);
}

// ── Sticky sprint bar -- shows immediately on first commit, or after 400px scroll ──
(function(){
  var hrefSet = false, bar = document.getElementById('stickyCta');
  function updateSticky(){
    if(!bar || !DATA || !DATA.sprint_cta_url){ if(bar) bar.style.display='none'; return; }
    var btn=document.getElementById('stickyBtn');
    var lbl=document.getElementById('stickyLabel');
    if(!hrefSet){ if(btn) btn.href = DATA.sprint_cta_url; hrefSet = true; }
    // Count committed recs
    var commitCount = Object.values(window.REC_COMMITMENTS||{}).filter(function(v){ return v==='commit'; }).length;
    var members = DATA.members||[];
    var leaderFirst = members.length===1 ? String(members[0].name||'').split(' ')[0] : null;
    // Label: once committed, call out their investment; otherwise generic
    if(window._hasCommitted && commitCount > 0){
      if(lbl) lbl.textContent = "You are in on "+commitCount+" -- here is the Sprint that delivers them";
      if(btn) btn.textContent = 'Review the Sprint \u2192';
    } else if(leaderFirst){
      if(lbl) lbl.textContent = 'The 90-Day Sprint';
      if(btn) btn.textContent = 'Start '+leaderFirst+"'s Sprint \u2192";
    } else {
      if(lbl) lbl.textContent = 'The 90-Day Sprint';
      if(btn) btn.textContent = 'Get started \u2192';
    }
    // Show immediately on first commit; otherwise on scroll
    if(window._hasCommitted || window.scrollY > 400){ bar.style.display='block'; } else { bar.style.display='none'; }
  }
  window.addEventListener('scroll', updateSticky, {passive:true});
  // Expose so commitment buttons can trigger a re-render
  window._updateSticky = updateSticky;
  // Reset href flag when team changes
  var _origLoadTeam = loadTeam;
  loadTeam = function(id){ hrefSet=false; _origLoadTeam(id); };
})();

<div id="gpsInstall" style="display:none;position:fixed;left:0;right:0;bottom:0;z-index:9000;background:#fff;border-top:3px solid #004369;box-shadow:0 -6px 24px rgba(0,0,0,.16);padding:16px 18px;font-family:'Open Sans',Arial,sans-serif;">
  <div style="max-width:560px;margin:0 auto;position:relative;">

      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;color:#004369;font-size:15px;">Save your Decision Room</div>
        <div id="gpsInstallMsg" style="font-size:13px;color:#555;margin-top:2px;">Keep it one tap away.</div>
      </div>
    </div>

</div>
<script>
(function(){
  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(function(){}); }
  var deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferredPrompt = e; });
  // Snooze by OPEN COUNT (matches the client portal): "Not now" hides it for ~12
  // visits, "Save it" for ~180. Shown on the 1st open then every 7th (see maybeShow).
  var OPENS='gps_install_opens', SNZ='gps_install_snooze_until';
  function opensCount(){ try{ return parseInt(localStorage.getItem(OPENS)||'0',10)||0; }catch(_){ return 0; } }
  function bumpOpens(){ try{ var n=opensCount()+1; localStorage.setItem(OPENS,String(n)); return n; }catch(_){ return 0; } }
  function snoozed(){ try{ var u=parseInt(localStorage.getItem(SNZ)||'0',10)||0; return opensCount() < u; }catch(_){ return false; } }
  function setSnooze(n){ try{ localStorage.setItem(SNZ, String(opensCount()+n)); }catch(_){ } }
  function hideBanner(){ var el=document.getElementById('gpsInstall'); if(el) el.style.display='none'; }
  window.gpsInstallNotNow = function(){ setSnooze(12); hideBanner(); };
  window.gpsInstallSaved  = function(){ setSnooze(180); hideBanner(); };
  window.gpsInstallDismiss = window.gpsInstallNotNow;
  function standalone(){ return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true; }
  function iOS(){ return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream; }
  function android(){ return /Android/.test(navigator.userAgent); }
  function dismissed(){ return snoozed(); }
  function qr(container){
    var wrap=document.createElement('div'); wrap.style.cssText='margin-top:8px;display:flex;gap:12px;align-items:center;';
    var box=document.createElement('div');
    var cap=document.createElement('div'); cap.style.cssText='font-size:12.5px;color:#555;line-height:1.5;'; cap.textContent='On your phone? Scan to open your Decision Room there, then add it to your home screen.';
    wrap.appendChild(box); wrap.appendChild(cap); container.appendChild(wrap);
    var s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
    s.onload=function(){ try{ new QRCode(box,{text:location.href,width:108,height:108,colorDark:'#004369',colorLight:'#ffffff'}); }catch(_){ } };
    document.body.appendChild(s);
  }
  function render(){
    if (standalone() || dismissed()) return;
    var card=document.getElementById('gpsInstall'), msg=document.getElementById('gpsInstallMsg'), act=document.getElementById('gpsInstallActions');
    if(!card||!act) return; act.innerHTML='';
    if (iOS()) {
      msg.textContent='Add it to your home screen for one-tap access:';
      act.innerHTML='<div style="font-size:13px;color:#333;line-height:1.6;">Tap the <b>Share</b> button (bottom of Safari, top right of Chrome), then choose <b>"Add to Home Screen."</b></div>';
    } else if (deferredPrompt) {
      msg.textContent='Install it as an app for one-tap access.';
    } else if (android()) {
      msg.textContent='Add it to your home screen:';
      act.innerHTML='<div style="font-size:13px;color:#333;line-height:1.6;">Tap the <b>⋮</b> menu in Chrome, then <b>"Add to Home screen."</b></div>';
    } else {
      msg.textContent='Keep it one click away:';
      act.innerHTML='<div style="font-size:13px;color:#333;line-height:1.6;margin-bottom:4px;">Bookmark this page (Ctrl/Cmd+D), or use the install icon in your browser\'s address bar.</div>';
      qr(act);
    }
    // Always offer a clear yes + a "Not now" that snoozes -- consistent with the client portal.
    var row=document.createElement('div'); row.style.cssText='display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;';
    var yes=document.createElement('button');
    yes.style.cssText='background:#004369;color:#fff;border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:700;cursor:pointer;flex:1;min-width:130px;';
    if (deferredPrompt){ yes.textContent='Add to my home screen'; yes.onclick=function(){ deferredPrompt.prompt(); deferredPrompt.userChoice.finally(function(){ deferredPrompt=null; window.gpsInstallSaved(); }); }; }
    else { yes.textContent='Save it'; yes.onclick=function(){ window.gpsInstallSaved(); }; }
    var no=document.createElement('button'); no.textContent='Not now';
    no.style.cssText='background:#fff;color:#555;border:1.5px solid #cbd5e1;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;cursor:pointer;flex:0 0 auto;';
    no.onclick=function(){ window.gpsInstallNotNow(); };
    row.appendChild(yes); row.appendChild(no); act.appendChild(row);
    card.style.display='block';
  }
  function maybeShow(){
    var n=bumpOpens();
    if (!(n===1 || n%7===0)) return;   // 1st open, then every 7th -- never every visit
    var hasToken = /[?&]token=/.test(location.search) || (function(){ try{ return !!localStorage.getItem('gps_sponsor_token'); }catch(_){ return false; } })();
    if (hasToken) setTimeout(render, 2500);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', maybeShow); else maybeShow();
})();
</script>
</body>
</html>
