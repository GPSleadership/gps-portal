<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GPS Workshop Dashboard</title>
<link rel="icon" type="image/png" sizes="192x192" href="/icons/gps-192.png" />
<link rel="apple-touch-icon" href="/icons/gps-apple-touch.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy:#004369; --red:#DB1F48; --teal:#01949A; --sand:#E5DDC8; --navy-dark:#002D47;
    --light-teal:#E8F7F7; --light-sand:#F7F4EE; --white:#fff; --gray-100:#f5f5f5; --gray-200:#e8e8e8;
    --gray-300:#d0d0d0; --gray-600:#666; --text:#1a1a1a; --trust:#1565c0; --proactivity:#2e7d32; --productivity:#e65100;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Open Sans',sans-serif; background:var(--gray-100); color:var(--text); min-height:100vh; padding-bottom:40px; }
  .top-bar { height:6px; background:linear-gradient(to right,var(--navy),var(--teal),var(--red)); }
  .bottom-bar { position:fixed; bottom:0; left:0; right:0; height:4px; background:linear-gradient(to right,var(--teal),var(--navy)); z-index:50; }
  .header { background:var(--navy); padding:16px 32px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
  .header-left { display:flex; align-items:center; gap:14px; }
  .header-logo-text { font-family:'Montserrat',sans-serif; font-size:22px; font-weight:800; color:var(--sand); letter-spacing:1px; }
  .header-title { color:rgba(255,255,255,0.75); font-size:11px; text-transform:uppercase; letter-spacing:0.6px; font-weight:600; }
  .header-sub { color:var(--white); font-family:'Montserrat',sans-serif; font-size:15px; font-weight:700; }
  .header-who { color:rgba(255,255,255,0.85); font-size:12px; text-align:right; }
  .wrap { max-width:1080px; margin:0 auto; padding:22px 24px; }
  .page-title { font-family:'Montserrat',sans-serif; font-size:24px; font-weight:800; color:var(--navy); }
  .page-sub { font-size:13px; color:var(--gray-600); margin:2px 0 16px; }
  .card { background:#fff; border-radius:8px; box-shadow:0 2px 12px rgba(0,0,0,.07); padding:20px 22px; margin-bottom:16px; }
  .card-head { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
  .card-title { font-family:'Montserrat',sans-serif; font-size:15px; font-weight:800; color:var(--navy); display:flex; align-items:center; gap:9px; }
  .card-title .dot { width:9px; height:9px; border-radius:50%; background:var(--teal); }
  .quick-read { font-size:14.5px; font-weight:600; color:var(--navy-dark); line-height:1.5; background:var(--light-teal); border-left:3px solid var(--teal); border-radius:6px; padding:11px 14px; margin-bottom:14px; }
  .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px; }
  @media (max-width:680px){ .stat-grid { grid-template-columns:1fr 1fr; } }
  .stat { background:var(--light-sand); border-radius:8px; padding:14px; text-align:center; }
  .stat .v { font-family:'Montserrat',sans-serif; font-weight:800; font-size:26px; color:var(--navy); }
  .stat .l { font-size:10.5px; color:var(--gray-600); text-transform:uppercase; letter-spacing:0.5px; margin-top:3px; display:flex; align-items:center; justify-content:center; gap:4px; }
  .tip { cursor:help; width:14px; height:14px; border:1px solid var(--gray-300); border-radius:50%; font-size:9px; color:var(--gray-600); display:inline-flex; align-items:center; justify-content:center; }
  .tp3-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  @media (max-width:720px){ .tp3-grid { grid-template-columns:1fr; } }
  .tp3-cell { border:1px solid var(--gray-200); border-radius:8px; padding:13px 15px; }
  .tp3-name { font-family:'Montserrat',sans-serif; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; }
  .tp3-trust .tp3-name { color:var(--trust); } .tp3-proactivity .tp3-name { color:var(--proactivity); } .tp3-productivity .tp3-name { color:var(--productivity); }
  .tp3-score { font-family:'Montserrat',sans-serif; font-size:26px; font-weight:800; color:var(--navy); margin:4px 0; }
  .tp3-score span { font-size:13px; color:var(--gray-600); font-weight:600; }
  .bar-track { background:var(--gray-200); height:8px; border-radius:4px; overflow:hidden; margin:6px 0 7px; }
  .bar-fill { height:100%; border-radius:4px; }
  .tp3-trust .bar-fill { background:var(--trust); } .tp3-proactivity .bar-fill { background:var(--proactivity); } .tp3-productivity .bar-fill { background:var(--productivity); }
  .tp3-prior { font-size:11px; color:var(--gray-600); margin-top:6px; line-height:1.35; }
  .trend-up { color:var(--proactivity); font-weight:700; } .trend-down { color:var(--red); font-weight:700; } .trend-flat { color:var(--gray-600); font-weight:700; }
  .theme-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; } @media (max-width:680px){ .theme-grid { grid-template-columns:1fr; } }
  .theme-col { border:1px solid var(--gray-200); border-radius:8px; padding:13px 15px; }
  .theme-head { font-family:'Montserrat',sans-serif; font-weight:800; font-size:12px; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:9px; }
  .theme-head.theme-good { color:var(--proactivity); } .theme-head.theme-risk { color:var(--red); }
  .theme-list { margin:0 0 0 17px; font-size:13px; line-height:1.6; color:var(--navy-dark); }
  .focus-label { font-size:11px; font-weight:700; color:var(--gray-600); text-transform:uppercase; letter-spacing:0.5px; margin:16px 0 7px; display:block; }
  .focus-box { background:var(--light-sand); border-radius:8px; padding:14px 16px; }
  .focus-list { list-style:none; margin:0; } .focus-list li { margin:0 0 10px; font-size:13.5px; line-height:1.5; } .focus-list li:last-child { margin-bottom:0; }
  .focus-list .ftext { font-weight:700; color:var(--navy-dark); } .focus-list .fmeta { font-size:12px; color:var(--gray-600); margin-top:2px; }
  .rec { background:linear-gradient(135deg,var(--navy),var(--teal)); color:#fff; border-radius:10px; padding:22px 24px; margin-bottom:16px; }
  .rec-kicker { font-family:'Montserrat',sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:0.6px; opacity:.85; }
  .rec h2 { font-family:'Montserrat',sans-serif; font-size:20px; font-weight:800; margin:6px 0 8px; }
  .rec p { font-size:14px; line-height:1.55; opacity:.96; margin-bottom:16px; }
  .cta-btn { display:inline-block; background:var(--red); color:#fff; font-family:'Montserrat',sans-serif; font-weight:800; font-size:14px; padding:13px 26px; border-radius:8px; text-decoration:none; cursor:pointer; border:none; letter-spacing:0.3px; }
  .tl { list-style:none; margin:6px 0 0; }
  .tl li { display:flex; gap:13px; align-items:flex-start; padding:9px 0; }
  .tl .dot2 { width:15px; height:15px; border-radius:50%; border:2px solid var(--gray-300); background:#fff; flex:none; margin-top:3px; }
  .tl li.done .dot2 { background:var(--teal); border-color:var(--teal); }
  .tl li.current .dot2 { border-color:var(--teal); box-shadow:0 0 0 4px var(--light-teal); }
  .tl .lbl { font-weight:700; font-size:13.5px; color:var(--navy-dark); } .tl li.upcoming .lbl { color:var(--gray-600); font-weight:600; }
  .tl .meta { font-size:12px; color:var(--gray-600); margin-top:1px; }
  .tl-now { display:inline-block; font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:0.3px; background:var(--light-teal); color:var(--navy); padding:2px 8px; border-radius:10px; margin-left:8px; }
  .tl-note { font-size:12.5px; color:var(--navy-dark); background:var(--light-sand); border-radius:7px; padding:10px 13px; margin-top:12px; }
  .actions { display:flex; gap:10px; flex-wrap:wrap; }
  .btn-ghost { background:#fff; border:1.5px solid var(--gray-300); color:var(--navy); font-family:'Open Sans',sans-serif; font-weight:600; font-size:12.5px; padding:9px 15px; border-radius:7px; cursor:pointer; }
  .btn-ghost:hover { background:var(--gray-100); }
  .empty { font-size:13px; color:var(--gray-600); font-style:italic; padding:8px 0; }
  .loading { text-align:center; padding:60px 20px; color:var(--gray-600); }
  .spinner { width:36px; height:36px; border:4px solid var(--gray-300); border-top-color:var(--teal); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; } @keyframes spin { to { transform:rotate(360deg); } }
  @media print {
    body { background:#fff; padding:0; }
    .top-bar, .bottom-bar, .actions, .btn-ghost, #tlCard { display:none !important; }
    .card { box-shadow:none; border:1px solid var(--gray-200); break-inside:avoid; }
    .rec { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .header { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  }
</style>
</head>
<body>
<div class="top-bar"></div>
<header class="header">
  <div class="header-left">
    <div class="header-logo-text">GPS</div>
    <div><div class="header-title">Leadership Solutions</div><div class="header-sub">Workshop Dashboard</div></div>
  </div>
  <div class="header-who" id="headerWho"></div>
</header>
<div class="wrap"><div id="view"><div class="loading"><div class="spinner"></div>Loading your workshop dashboard…</div></div></div>
<div class="bottom-bar"></div>
<script>
(function(){
  var TOKEN = new URLSearchParams(location.search).get('token') || '';
  var view = document.getElementById('view');
  function esc(t){ return String(t==null?'':t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmtDate(d){ if(!d) return ''; var s=String(d).slice(0,10).split('-'); if(s.length<3) return String(d); var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return m[parseInt(s[1],10)-1]+' '+parseInt(s[2],10)+', '+s[0]; }

  if(!TOKEN){ view.innerHTML='<div class="card"><div class="empty">This link is missing its access token. Please use the link from your invitation email.</div></div>'; return; }
  fetch('/api/workshop-sponsor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:TOKEN})})
    .then(function(r){ return r.json().then(function(j){ if(!r.ok) throw new Error(j.error||('HTTP '+r.status)); return j; }); })
    .then(render).catch(function(e){ view.innerHTML='<div class="card"><div class="empty">'+esc(e.message)+'</div></div>'; });

  function pct(v){ return v==null?0:Math.max(0,Math.min(100,Math.round(v/5*100))); }
  function tpCell(cls,name,o){
    if(!o||(o.post==null&&o.pre==null)) return '<div class="tp3-cell tp3-'+cls+'"><div class="tp3-name">'+name+'</div><div class="tp3-score">—</div><div class="tp3-prior">No survey data yet.</div></div>';
    var cur=(o.post!=null?o.post:o.pre);
    var prior='';
    if(o.pre!=null&&o.post!=null){ var d=o.delta; var tc=d>0?'trend-up':(d<0?'trend-down':'trend-flat'); var ar=d>0?'▲ +':(d<0?'▼ ':'• '); prior='<div class="tp3-prior">Pre '+o.pre+' → Post '+o.post+' <span class="'+tc+'">'+ar+(d!=null?Math.abs(d):'0')+'</span> · 1–5 scale; 4 is healthy</div>'; }
    else { prior='<div class="tp3-prior">'+cur+' / 5.0 · 1–5 scale; 4 is healthy</div>'; }
    return '<div class="tp3-cell tp3-'+cls+'"><div class="tp3-name">'+name+'</div><div class="tp3-score">'+cur+' <span>/ 5.0</span></div><div class="bar-track"><div class="bar-fill" style="width:'+pct(cur)+'%"></div></div>'+prior+'</div>';
  }
  function quickRead(s){
    var t=s.tp3||{}; var ds=[t.trust,t.proactivity,t.productivity].map(function(x){return x&&x.delta;}).filter(function(x){return x!=null;});
    var gained=ds.length&&ds.every(function(x){return x>=0;});
    var npsTxt=s.nps!=null?('NPS '+s.nps):'';
    if(s.nps!=null&&s.nps>=50&&gained) return 'A strong result — participation was high'+(npsTxt?' ('+npsTxt+')':'')+' and trust, proactivity, and productivity all moved up. The opportunity now is to lock the gains into a repeatable system.';
    if(s.nps!=null&&s.nps<0) return 'A candid result'+(npsTxt?' ('+npsTxt+')':'')+'. The data points to real friction to work through before momentum can build — worth addressing head-on.';
    return 'A mixed result'+(npsTxt?' ('+npsTxt+')':'')+'. Clear strengths to build on and a few risks that are costing time day to day.';
  }
  function focusItem(f){ if(f&&typeof f==='object'){ return '<li><span class="ftext">'+esc(f.text||'')+'</span>'+((f.owner||f.start)?'<div class="fmeta">'+(f.owner?'Owner: '+esc(f.owner):'')+(f.owner&&f.start?' · ':'')+(f.start?'Start: '+esc(f.start):'')+'</div>':'')+'</li>'; } return '<li><span class="ftext">'+esc(f)+'</span></li>'; }
  function themeLabel(t){ var m={trust:'Trust',proactivity:'Proactivity',productivity:'Productivity',delegation:'Delegation',meetings:'Meetings',communication:'Communication',satisfaction:'Satisfaction'}; return m[t]||(t?t.charAt(0).toUpperCase()+t.slice(1):t); }
  function bandColor(v){ return v==null?'#d0d0d0':(v>=4?'#2e7d32':(v>=3?'#e65100':'#DB1F48')); }
  function themeCompareCard(tbl){
    var rows=(tbl||[]).filter(function(r){ return r.theme!=='open'&&r.theme!=='feedback'; });
    if(!rows.length) return '';
    var hasPost=rows.some(function(r){ return r.post!=null; });
    var intro=hasPost?'Where the team moved from before the workshop to after. Green = gains, red = still needs focus.':'Pre-workshop read — the lower scores are where this workshop should focus.';
    var body=rows.map(function(r){
      var pre=r.pre, post=r.post, d=r.delta, cur=(post!=null?post:pre), chip='';
      if(pre!=null&&post!=null){ var cls=d>0?'trend-up':(d<0?'trend-down':'trend-flat'); var ar=d>0?'▲ +':(d<0?'▼ ':'• '); chip='<span class="'+cls+'">'+ar+(d!=null?Math.abs(d):0)+'</span>'; }
      var barw=cur!=null?Math.round(cur/5*100):0;
      return '<tr><td style="padding:8px 10px;font-weight:600;color:var(--navy-dark)">'+esc(themeLabel(r.theme))+'</td>'+
        '<td style="padding:8px 10px;text-align:center;color:var(--gray-600)">'+(pre!=null?pre:'—')+'</td>'+
        '<td style="padding:8px 10px;text-align:center;font-weight:700;color:var(--navy)">'+(post!=null?post:'—')+'</td>'+
        '<td style="padding:8px 10px;min-width:110px"><div class="bar-track" style="margin:0"><div class="bar-fill" style="width:'+barw+'%;background:'+bandColor(cur)+'"></div></div></td>'+
        '<td style="padding:8px 10px;text-align:center;font-size:12px">'+chip+'</td></tr>';
    }).join('');
    return '<div class="card"><div class="card-title" style="margin-bottom:8px"><span class="dot"></span>Pre → Post by theme</div><div style="font-size:13px;color:var(--gray-600);margin-bottom:10px">'+intro+'</div>'+
      '<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="background:var(--navy);color:#fff"><th style="padding:8px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.4px">Theme</th><th style="padding:8px 10px;font-size:10px;text-transform:uppercase">Pre</th><th style="padding:8px 10px;font-size:10px;text-transform:uppercase">Post</th><th style="padding:8px 10px;font-size:10px;text-transform:uppercase">Post level</th><th style="padding:8px 10px;font-size:10px;text-transform:uppercase">Change</th></tr></thead><tbody>'+body+'</tbody></table></div>';
  }

  function render(d){
    if(!d||!d.ok){ view.innerHTML='<div class="card"><div class="empty">'+esc(d&&d.error||'Link not recognized.')+'</div></div>'; return; }
    var w=d.workshop, s=d.exec_summary||{}, rec=d.recommendation&&d.recommendation.primary;
    document.getElementById('headerWho').textContent = ''; // sponsor name not returned; keep clean
    var part=s.participation||{pre:{rate:0},post:{rate:0},total:0};
    var html='';
    html+='<div class="page-title">'+esc(w.title)+'</div><div class="page-sub">'+esc(w.org||'')+(w.workshop_date?' · Workshop '+fmtDate(w.workshop_date):'')+(w.debrief_date?' · Debrief '+fmtDate(w.debrief_date):'')+'</div>';

    // 1) WHAT HAPPENED — Executive summary
    html+='<div class="card"><div class="card-head"><div class="card-title"><span class="dot"></span>Executive summary</div><div class="actions"><button class="btn-ghost" id="dlPdf">Download 1-page summary</button><button class="btn-ghost" id="cpEmail">Copy summary for email</button></div></div>';
    html+='<div class="quick-read">'+esc(quickRead(s))+'</div>';
    html+='<div class="stat-grid">'+
      '<div class="stat"><div class="v">'+(part.pre?part.pre.rate:0)+'%</div><div class="l">Pre response <span class="tip" title="% of invited participants who responded.">i</span></div></div>'+
      '<div class="stat"><div class="v">'+(part.post?part.post.rate:0)+'%</div><div class="l">Post response <span class="tip" title="% of invited participants who responded.">i</span></div></div>'+
      '<div class="stat"><div class="v">'+(s.nps!=null?s.nps:'—')+'</div><div class="l">Workshop NPS <span class="tip" title="Promoters minus detractors; 50+ is strong.">i</span></div></div>'+
      '<div class="stat"><div class="v">'+(part.total||0)+'</div><div class="l">Participants</div></div></div>';
    var t=s.tp3||{};
    html+='<div class="tp3-grid">'+tpCell('trust','Trust',t.trust)+tpCell('proactivity','Proactivity',t.proactivity)+tpCell('productivity','Productivity',t.productivity)+'</div></div>';

    // 1b) Pre -> Post by theme (factual; always shown)
    html+=themeCompareCard(d.themeTable);

    // 2) SO WHAT — interpretation (gated behind coach review/approval)
    if(d.finalizing){
      html+='<div class="card"><div class="card-title" style="margin-bottom:10px"><span class="dot"></span>What the data says</div><div class="quick-read">Your coach is finalizing the written summary, focus areas, and recommended next step. The numbers above are live now — the narrative and recommendation will appear here once they\'ve been reviewed.</div></div>';
    } else {
      var str=(s.strengths&&s.strengths.length?s.strengths:(d.findings&&d.findings.strengths)||[]);
      var rsk=(s.risks&&s.risks.length?s.risks:(d.findings&&d.findings.risks)||[]);
      html+='<div class="card"><div class="card-title" style="margin-bottom:14px"><span class="dot"></span>What the data says</div>';
      html+='<div class="theme-grid"><div class="theme-col"><div class="theme-head theme-good">Top strengths</div><ul class="theme-list">'+(str.length?str.map(function(x){return '<li>'+esc(x)+'</li>';}).join(''):'<li class="empty">Strengths appear once survey data is in.</li>')+'</ul></div>'+
        '<div class="theme-col"><div class="theme-head theme-risk">Top risks</div><ul class="theme-list">'+(rsk.length?rsk.map(function(x){return '<li>'+esc(x)+'</li>';}).join(''):'<li class="empty">No notable risks surfaced.</li>')+'</ul></div></div>';
      var focus=s.focus90||[];
      html+='<span class="focus-label">Recommended 90-day focus</span><div class="focus-box">'+(focus.length?'<ol class="focus-list" style="padding-left:18px;list-style:decimal">'+focus.map(focusItem).join('')+'</ol>':'<div class="empty">Your 90-day focus will appear after the debrief.</div>')+'</div></div>';

      // 3) NOW WHAT — recommended next step
      if(rec){
        var ctaUrl = d.cta_url || 'https://api.leadconnectorhq.com/widget/bookings/30-minute-coaching-discovery-call';
        html+='<div class="rec"><div class="rec-kicker">Now what — recommended next step</div><h2>'+esc(rec.headline||rec.step)+'</h2><p>'+esc(rec.rationale||'')+'</p><a class="cta-btn" href="'+esc(ctaUrl)+'" target="_blank" rel="noopener">Schedule a 30-minute call to review this →</a></div>';
      }
    }

    // Timeline
    if(d.timeline&&d.timeline.length){
      var cur=d.timeline.filter(function(m){return m.state==='current';})[0];
      var next=d.timeline.filter(function(m){return m.state==='upcoming';})[0];
      var note = cur ? ('You are here: '+cur.label+'.'+(next?' Next: '+next.label+'.':'')) : (next?('Next: '+next.label+'.'):'');
      html+='<div class="card" id="tlCard"><div class="card-title" style="margin-bottom:10px"><span class="dot"></span>Where things stand</div><ul class="tl">';
      d.timeline.forEach(function(m){
        var meta=''; if(m.detail) meta+=m.detail; if(m.date) meta+=(meta?' · ':'')+fmtDate(m.date);
        html+='<li class="'+m.state+'"><span class="dot2"></span><div><div class="lbl">'+esc(m.label)+(m.state==='current'?'<span class="tl-now">Now</span>':'')+'</div>'+(meta?'<div class="meta">'+esc(meta)+'</div>':'')+'</div></li>';
      });
      html+='</ul><div class="tl-note">'+esc(note)+'</div></div>';
    }

    view.innerHTML=html;
    var pdf=document.getElementById('dlPdf'); if(pdf) pdf.onclick=function(){ window.print(); };
    var cp=document.getElementById('cpEmail'); if(cp) cp.onclick=function(){ copyEmail(w,s,rec); };
  }
  function copyEmail(w,s,rec){
    var L=[w.title+' — workshop summary','','WHAT HAPPENED'];
    var p=s.participation||{}; L.push('Participation: '+((p.pre&&p.pre.rate)||0)+'% pre, '+((p.post&&p.post.rate)||0)+'% post · NPS '+(s.nps!=null?s.nps:'n/a'));
    var t=s.tp3||{}; function ba(x){ return x?((x.pre!=null&&x.post!=null)?(x.pre+'→'+x.post):(x.post!=null?x.post:x.pre)):'n/a'; }
    L.push('Trust '+ba(t.trust)+', Proactivity '+ba(t.proactivity)+', Productivity '+ba(t.productivity)+' (1–5 scale)');
    L.push('','SO WHAT'); (s.strengths||[]).forEach(function(x){L.push('Strength: '+x);}); (s.risks||[]).forEach(function(x){L.push('Risk: '+x);});
    if((s.focus90||[]).length){ L.push('90-day focus:'); s.focus90.forEach(function(f,i){ L.push('  '+(i+1)+'. '+(typeof f==='object'?f.text:f)); }); }
    if(rec){ L.push('','NOW WHAT',rec.headline||rec.step,(rec.rationale||'')); }
    var txt=L.join('\n');
    if(navigator.clipboard){ navigator.clipboard.writeText(txt).then(function(){ alert('Summary copied to your clipboard.'); },function(){ window.prompt('Copy this summary:', txt); }); }
    else window.prompt('Copy this summary:', txt);
  }
})();
</script>
